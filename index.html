<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>你的雲科角落</title>

<style>

body{
    font-family: "Microsoft JhengHei", sans-serif;
    background: linear-gradient(
        135deg,
        #f7f9fc,
        #dfefff
    );
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:0;
}

.container{
    width:500px;
    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.1);
}

.corner-image{
    width:100%;
    margin:18px 0;
    border-radius:16px;
    display:none;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

h1{
    text-align:center;
    color:#3b5d7a;
}

select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;

    border-radius:10px;
    border:1px solid #ccc;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#6ea8d9;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    background:#4f91cb;
}

.result{

    margin-top:30px;

    padding:20px;

    background:#f4f8fc;

    border-radius:15px;
}

#corner{
    color:#2d4f6b;
}

.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:24px;
}

.options label{
    padding:14px;
    border:1px solid #cfddea;
    border-radius:14px;
    background:#f8fbff;
    cursor:pointer;
    transition:.2s;
}

.options label:hover{
    background:#eaf4ff;
    transform:translateY(-2px);
}

.options input{
    margin-right:8px;
}

</style>
</head>

<body>
  <div class="container">

<h1>找出你的雲科角落</h1>

<p>你喜歡什麼樣的地方？</p>

<div class="options">
  <label><input type="radio" name="place" value="quiet" checked> 安靜</label>
  <label><input type="radio" name="place" value="nature"> 自然</label>
  <label><input type="radio" name="place" value="creative"> 有設計感</label>
  <label><input type="radio" name="place" value="active"> 熱鬧</label>
</div>

<p>你喜歡哪種風景？</p>

<div class="options">
  <label><input type="radio" name="scenery" value="lake" checked> 湖泊樹木</label>
  <label><input type="radio" name="scenery" value="building"> 建築景觀</label>
  <label><input type="radio" name="scenery" value="people"> 人群與活動</label>
  <label><input type="radio" name="scenery" value="sunset"> 夕陽與天空</label>
</div>

<p>你覺得自己比較像？</p>

<div class="options">
  <label><input type="radio" name="personality" value="gentle" checked> 溫柔</label>
  <label><input type="radio" name="personality" value="thinker"> 常思考</label>
  <label><input type="radio" name="personality" value="creative"> 有創意</label>
  <label><input type="radio" name="personality" value="leader"> 行動派</label>
</div>

<p>下課後你最常？</p>

<div class="options">
  <label><input type="radio" name="afterClass" value="alone" checked> 自己待著</label>
  <label><input type="radio" name="afterClass" value="friends"> 找朋友聊天</label>
  <label><input type="radio" name="afterClass" value="walk"> 在校園散步</label>
  <label><input type="radio" name="afterClass" value="club"> 參加活動</label>
</div>

<p>遇到壓力時你會？</p>

<div class="options">
  <label><input type="radio" name="stress" value="quiet" checked> 找安靜的地方</label>
  <label><input type="radio" name="stress" value="music"> 聽音樂</label>
  <label><input type="radio" name="stress" value="talk"> 找朋友傾訴</label>
  <label><input type="radio" name="stress" value="busy"> 讓自己忙起來</label>
</div>



<button id="generateBtn" onclick="getResult()">
產生我的角落
</button>

<div class="result">

<h2 id="corner"></h2>

<img id="cornerImage" class="corner-image" src="" alt="雲科角落照片">


<p id="text"></p>

</div>

</div>

  <script>

async function getResult() {

  const button = document.getElementById("generateBtn");
button.disabled = true;
button.innerText = "生成中...";

    let scores = {
    library: 0,
    lake: 0,
    design: 0,
    stadium: 0,
    gate: 0,
    activity: 0,
    dorm: 0,
    bench: 0
};

    const place = document.querySelector('input[name="place"]:checked').value;

    const scenery = document.querySelector('input[name="scenery"]:checked').value;

    const personality = document.querySelector('input[name="personality"]:checked').value;

    const afterClass = document.querySelector('input[name="afterClass"]:checked').value;

    const stress = document.querySelector('input[name="stress"]:checked').value;

    if (place === "quiet") scores.library += 2;
    if (place === "nature") scores.lake += 2;
    if (place === "creative") scores.design += 2;
    if (place === "active") scores.stadium += 2;

    if (scenery === "lake") scores.lake += 2;
    if (scenery === "building") scores.design += 2;
    if (scenery === "people") scores.activity += 2;
    if (scenery === "sunset") scores.gate += 2;

    if (personality === "gentle") scores.library += 1;
    if (personality === "thinker") scores.lake += 1;
    if (personality === "creative") scores.design += 1;
    if (personality === "leader") scores.stadium += 1;

    if(afterClass === "alone"){
    scores.bench += 2;
    scores.lake += 1;
}

if(afterClass === "friends"){
    scores.activity += 2;
    scores.dorm += 1;
}

if(afterClass === "walk"){
    scores.gate += 1;
    scores.lake += 2;
}

if(afterClass === "club"){
    scores.activity += 2;
    scores.stadium += 1;
}

if(stress === "quiet"){
    scores.bench += 2;
    scores.library += 1;
}

if(stress === "music"){
    scores.design += 2;
}

if(stress === "talk"){
    scores.activity += 2;
}

if(stress === "busy"){
    scores.stadium += 2;
}

    let result = Object.keys(scores).reduce((a, b) =>
        scores[a] > scores[b] ? a : b
    );

    const data = {

    library: {
        name: "圖書館前草地",
        image: "images/IMG_5546.PNG"
    },

    lake: {
        name: "雲夢湖",
        image: "images/IMG_5837.JPG"
    },

    design: {
        name: "設計學院走廊",
        image: "images/in.jpg"
    },

    stadium: {
        name: "操場司令台",
        image: "images/skz.jpg"
    },

    gate: {
        name: "校門口",
        image: "images/jeongin.jpg"
    },

    activity: {
        name: "學生活動中心",
        image: "images/in1788.JPG"
    },

    dorm: {
        name: "宿舍前廣場",
        image: "images/IMG_5003.PNG"
    },

    bench: {
        name: "樹蔭長椅",
        image: "images/IMG_5656.PNG"
    }

};

    const cornerName = data[result].name;
    const cornerImg = data[result].image;

    document.getElementById("corner").innerText =
        "你的雲科角落是：" + cornerName;

        const imageElement = document.getElementById("cornerImage");
        imageElement.src = cornerImg;
        imageElement.style.display = "block";

    document.getElementById("text").innerText =
        "正在為你生成專屬文字...";

    try {

        const response = await fetch("/generate", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
            corner: cornerName,
            place,
            scenery,
            personality,
            afterClass,
            stress
            })
})

        const aiData = await response.json();

        document.getElementById("text").innerText =
            aiData.result;

    } catch (error) {

  console.error(error);

  document.getElementById("text").innerText =
    "系統忙碌中，請稍後再試一次🫶";

} finally {
  button.disabled = false;
  button.innerText = "產生我的角落";
}
}


</script>
</body>
</html>
